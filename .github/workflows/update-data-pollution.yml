name: Update Rotterdam Pollution Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch SmartCitizen Data
        run: |
          # Filtering by the 'rotterdam' tag directly
          curl -L -f "https://api.smartcitizen.me/v0/devices?tags=rotterdam" > data.json
          
          # Basic validation to ensure the file isn't empty
          if [ ! -s data.json ]; then echo "API returned no data"; exit 1; fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Live data sync" && git push)
