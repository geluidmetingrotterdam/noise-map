name: Update Rotterdam Pollution Data

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch SmartCitizen Data
        run: |
          # Fetching specifically for Rotterdam (City ID 214)
          curl -L -f "https://api.smartcitizen.me/v0/devices?city_id=214" > data.json
          
      - name: Commit and Push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update live sensor data" && git push)
