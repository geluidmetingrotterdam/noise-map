name: Update Rotterdam Pollution Data

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch SmartCitizen Data
        run: |
          # We use your Legacy API Key here to ensure full data access
          # 'q[city_cont]=Rotterdam' finds all sensors in the city
          curl -L -f "https://api.smartcitizen.me/v0/devices?q[city_cont]=Rotterdam&key=fb8f6dbad06f36ca09493af47be1c32d75a60f56" > data.json
          
      - name: Commit and Push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data.json
          # Only commit if the data has actually changed to avoid empty commits
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update live Rotterdam sensor data" && git push)
