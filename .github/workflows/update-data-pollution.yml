name: Update Rotterdam Pollution Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch SmartCitizen Data
        run: |
          # The quotes around the URL are mandatory because of the [ ] characters
          curl -L -v "https://api.smartcitizen.me/v0/devices?q[city_cont]=Rotterdam&key=fb8f6dbad06f36ca09493af47be1c32d75a60f56" > data.json
          
      - name: Commit and Push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update live Rotterdam sensor data" && git push)
