<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Noise Sensors in Rotterdam Centrum</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; }
    #map { height: 100vh; }
    .pulsing-icon div { width: 20px; height: 20px; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0.4); } 70% { transform: scale(1.4); box-shadow: 0 0 0 10px rgba(0,0,0,0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0); } }
    #legend { position: fixed; bottom: 30px; left: 10px; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.3); font-family: sans-serif; z-index: 1000; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="legend">
    <strong>Noise Exceedance</strong><br>
    <span style="color:green;">●</span> Within Norm<br>
    <span style="color:orange;">●</span> Slightly Above<br>
    <span style="color:red;">●</span> Above Norm
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([51.9191, 4.4801], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    async function loadSensors() {
      markersLayer.clearLayers();

      // Fetch both files in parallel
      const [locRes, csvRes] = await Promise.all([
        fetch('sensor_locations.json'),
        fetch('severity_cells_2025.csv')
      ]);

      const locMap = await locRes.json();
      const csvText = await csvRes.text();
      const rows = csvText.split('\n').slice(1); // Skip header

      rows.forEach(row => {
        const cols = row.split(',');
        if (cols.length < 11) return;
        
        const id = cols[0].trim();
        const exceedance = parseFloat(cols[10]);
        const loc = locMap[id];

        if (loc) {
          // Define color based on exceedance
          let color = exceedance > 5 ? 'red' : (exceedance > 0 ? 'orange' : 'green');

          L.marker([parseFloat(loc.lat), parseFloat(loc.lon)], {
            icon: L.divIcon({ 
              className: 'pulsing-icon', 
              html: `<div style="background:${color}"></div>` 
            })
          })
          .addTo(markersLayer)
          .bindPopup(`<strong>Sensor ID: ${id}</strong><br>Exceedance: ${exceedance.toFixed(2)} dB`);
        }
      });
    }

    loadSensors();
  </script>
</body>
</html>
