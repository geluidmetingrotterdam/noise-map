<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Noise Map Presentation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; background-color: #111; }
    #map { height: 100vh; }
    .pulsing-icon div { width: 20px; height: 20px; border-radius: 50%; opacity: 0.7; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0.7); } 70% { transform: scale(1.8); box-shadow: 0 0 0 15px rgba(var(--marker-rgb), 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0); } }
    #clock-container { position: fixed; top: 20px; right: 20px; z-index: 1000; background: #000; padding: 15px; border-radius: 8px; color: #fff; font-family: monospace; font-size: 24px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="clock-container">Time: <span id="time-display">00:00</span></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([51.9191, 4.4801], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let markersLayer = L.layerGroup().addTo(map);
    let animationData = [];
    let h = 0;

    // Load data from file
    fetch('animation_data.json')
      .then(response => response.json())
      .then(data => {
        animationData = data;
        setInterval(update, 800);
      });

    function update() {
      markersLayer.clearLayers();
      const frame = animationData.find(f => f.hour === h);
      if (frame) {
        frame.sensors.forEach(s => {
          // Color logic: Red if > 5 exceedance, Orange if > 0, Green otherwise
          let color = s.exceedance > 5 ? '255,0,0' : (s.exceedance > 0 ? '255,165,0' : '46,204,113');
          L.marker([s.lat, s.lon], { 
            icon: L.divIcon({ className: 'pulsing-icon', html: `<div style="background: rgb(${color}); --marker-rgb: ${color};"></div>` }) 
          }).addTo(markersLayer);
        });
        document.getElementById('time-display').innerText = `${h.toString().padStart(2, '0')}:00`;
      }
      h = (h + 1) % 24;
    }
  </script>
</body>
</html>
