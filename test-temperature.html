<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotterdam Active Temperature Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<script>
    const map = L.map('map').setView([51.9225, 4.47917], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Recursive function to fetch all pages of data
    async function fetchAllData(url, allPoints = []) {
        const proxy = 'https://corsproxy.io/?url=' + encodeURIComponent(url);
        const response = await fetch(proxy);
        const data = await response.json();

        const sensors = data.value || [];
        sensors.forEach(thing => {
            const coords = thing.Locations?.[0]?.location?.coordinates;
            const ds = thing.Datastreams?.[0];
            const temp = ds?.Observations?.[0]?.result;

            // Only proceed if active, has coordinates, and has a temperature reading
            if (coords && temp !== null && temp !== undefined && ds?.isActive === true) {
                
                // Rotterdam bounding box
                const isRotterdam = (coords[0] > 4.3 && coords[0] < 4.6 && coords[1] > 51.8 && coords[1] < 52.0);
                
                if (isRotterdam) {
                    allPoints.push([coords[1], coords[0], parseFloat(temp)]);
                }
            }
        });

        // Follow the '@iot.nextLink' if it exists
        if (data['@iot.nextLink']) {
            console.log("Fetching next page...");
            return fetchAllData(data['@iot.nextLink'], allPoints);
        } else {
            return allPoints;
        }
    }

    // Start fetching
    const initialUrl = 'https://api-virtualair.nilu.no/v1.1/Things?$expand=Datastreams/Observations($orderby=phenomenonTime%20desc;$top=1),Locations&$top=100';

    fetchAllData(initialUrl).then(allPoints => {
        if (allPoints.length > 0) {
            L.heatLayer(allPoints, {
                radius: 30, 
                blur: 20
            }).addTo(map);
            console.log("Success! Total active sensors mapped in Rotterdam: " + allPoints.length);
        } else {
            console.warn("No active sensors found in the Rotterdam area.");
        }
    }).catch(err => console.error("Error loading data:", err));
</script>
</body>
</html>
