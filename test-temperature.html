<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotterdam Temperature Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<script>
    // 1. Initialize Map
    const map = L.map('map').setView([51.9225, 4.47917], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Configuration for Rotterdam
    // The filter restricts data to the geographic area of Rotterdam
    const rotterdamBounds = 'POLYGON((4.3 51.8, 4.6 51.8, 4.6 52.0, 4.3 52.0, 4.3 51.8))';
    const tempDefinition = 'http://vocabs.lter-europe.net/EnvThes/22035';
    
    // Constructing the OGC Filtered URL
    const baseUrl = 'https://api-virtualair.nilu.no/v1.1/Things';
    const query = `?$expand=Datastreams/Observations($orderby=phenomenonTime%20desc;$top=1),Locations` +
                  `&$filter=st_within(Locations/location, geography'${rotterdamBounds}')` +
                  ` and Datastreams/ObservedProperty/definition eq '${tempDefinition}'`;
    
    const apiUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(baseUrl + query);

    // 3. Fetch and Map
    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            const heatPoints = [];
            
            // Logic to traverse the OGC SensorThings structure
            data.value.forEach(thing => {
                if (thing.Locations?.[0]?.location?.coordinates && thing.Datastreams?.[0]?.Observations?.[0]) {
                    const coords = thing.Locations[0].location.coordinates; // [lon, lat]
                    const temp = thing.Datastreams[0].Observations[0].result;
                    
                    if (temp !== null) {
                        heatPoints.push([coords[1], coords[0], temp]);
                    }
                }
            });

            if (heatPoints.length > 0) {
                L.heatLayer(heatPoints, {radius: 30, blur: 20, max: 30}).addTo(map);
                console.log("Success! Mapped " + heatPoints.length + " sensors in Rotterdam.");
            } else {
                console.warn("No sensors found in this area. Try adjusting the rotterdamBounds polygon.");
            }
        })
        .catch(err => console.error("Fetch failed:", err));
</script>

</body>
</html>
