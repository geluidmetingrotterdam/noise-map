<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotterdam Temperature Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<script>
    // 1. Initialize Map
    const map = L.map('map').setView([51.9225, 4.47917], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. API Config
    // Requesting Things with Locations and Observations
    const baseUrl = 'https://api-virtualair.nilu.no/v1.1/Things';
    const query = `?$expand=Datastreams/Observations($orderby=phenomenonTime%20desc;$top=1),Locations&$top=100`;
    const apiUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(baseUrl + query);

    // 3. Fetch Data
    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            console.log("Raw API Response:", data);
            const heatPoints = [];
            
            // Standard OGC SensorThings API uses 'value'
            const sensors = data.value || [];
            
            sensors.forEach(thing => {
                const coords = thing.Locations?.[0]?.location?.coordinates;
                const obs = thing.Datastreams?.[0]?.Observations?.[0]?.result;

                if (coords && obs !== null && obs !== undefined) {
                    // Manual filter: Only add if point is within Rotterdam area
                    // Lon: 4.3 to 4.6, Lat: 51.8 to 52.0
                    const isRotterdam = (coords[0] > 4.3 && coords[0] < 4.6 && coords[1] > 51.8 && coords[1] < 52.0);
                    
                    if (isRotterdam) {
                        // Leaflet expects [lat, lon, intensity]
                        heatPoints.push([coords[1], coords[0], parseFloat(obs)]);
                    }
                }
            });

            if (heatPoints.length > 0) {
                L.heatLayer(heatPoints, {
                    radius: 30,
                    blur: 20
                }).addTo(map);
                console.log("Success! Mapped " + heatPoints.length + " sensors in Rotterdam.");
            } else {
                console.warn("No sensors found in the Rotterdam area.");
            }
        })
        .catch(err => console.error("Error loading data:", err));
</script>
</body>
</html>
