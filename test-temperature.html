<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotterdam Environmental Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<script>
    const map = L.map('map').setView([51.9225, 4.47917], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const tempUrl = 'https://api-virtualair.nilu.no/v1.1/airTemperature';
    const proxy = 'https://corsproxy.io/?url=';

    // Fetch the Temperature data
    fetch(proxy + encodeURIComponent(tempUrl))
        .then(response => response.json())
        .then(data => {
            const heatPoints = [];
            
            data.data.forEach(item => {
                if (item.Datastreams && item.Datastreams.length > 0) {
                    const ds = item.Datastreams[0];
                    // Verify Thing, Location, and Result exist
                    if (ds.Thing?.Locations?.[0]?.location?.coordinates && ds.lastObservationResult !== null) {
                        const coords = ds.Thing.Locations[0].location.coordinates;
                        const temp = parseFloat(ds.lastObservationResult);
                        
                        // Add only if it's a valid number
                        if (!isNaN(temp)) {
                            heatPoints.push([coords[1], coords[0], temp]);
                        }
                    }
                }
            });

            if (heatPoints.length > 0) {
                L.heatLayer(heatPoints, {
                    radius: 30,
                    blur: 20,
                    max: 30 // Set based on typical max temp in Rotterdam
                }).addTo(map);
                console.log("Mapped " + heatPoints.length + " temperature points.");
            }
        })
        .catch(err => console.error("Error loading data:", err));
</script>
</body>
</html>
