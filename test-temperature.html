<!DOCTYPE html>
<html>
<head>
    <title>Rotterdam Temperature Heatmap</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<script>
    // 1. Initialize Map
    const map = L.map('map').setView([51.9225, 4.47917], 12); // Centered on Rotterdam
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Fetch Data from NILU API
    // We request Things with their Locations and latest Datastream observations
    const apiUrl = 'https://api-virtualair.nilu.no/v1.1/Things?$expand=Locations,Datastreams/Observations($orderby=phenomenonTime%20desc;$top=1)';

    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            const heatPoints = [];

            data.value.forEach(thing => {
                if (thing.Locations && thing.Datastreams) {
                    const coords = thing.Locations[0].location.coordinates; // [lon, lat]
                    
                    // Look for the temperature observation
                    thing.Datastreams.forEach(ds => {
                        if (ds.name.toLowerCase().includes('temperature') && ds.Observations.length > 0) {
                            const temp = ds.Observations[0].result;
                            // Leaflet heat expects [lat, lon, intensity]
                            heatPoints.push([coords[1], coords[0], temp]);
                        }
                    });
                }
            });

            // 3. Add Heatmap Layer
            // Adjust 'radius' and 'blur' to make the heat look better
            L.heatLayer(heatPoints, {radius: 25, blur: 15, maxZoom: 10}).addTo(map);
        })
        .catch(error => console.error('Error fetching data:', error));
</script>

</body>
</html>
