<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noise Map Animation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; background-color: #111; }
    /* Target only the tiles so markers remain crisp */
    .leaflet-tile-pane { transition: filter 0.5s ease; }
    #map { height: 100vh; }
    
    /* Larger, transparent rectangle style */
    .sensor-rect {
      width: 50px; height: 20px;
      /* No border */
    }

    #clock {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      background: rgba(0,0,0,0.7); color: white; padding: 15px;
      font-family: sans-serif; font-size: 20px; border-radius: 8px;
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div id="clock">Time: 00:00</div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { maxZoom: 18 }).setView([51.9191, 4.4801], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    const sensors = [
      [51.922, 4.475], [51.918, 4.480], [51.920, 4.485], [51.915, 4.470], [51.925, 4.490]
    ];

    let currentHour = 0; 

    function animateMap() {
      // 1. Calculate Brightness for Tiles
      const brightness = 0.65 + 0.35 * Math.cos(((currentHour - 12) / 24) * 2 * Math.PI);
      const tilePane = document.querySelector('.leaflet-tile-pane');
      if (tilePane) tilePane.style.filter = `brightness(${brightness})`;
      
      // 2. Update Clock
      document.getElementById('clock').innerText = `Time: ${currentHour.toString().padStart(2, '0')}:00`;

      // 3. Update Markers
      markersLayer.clearLayers();
      const norm = (currentHour >= 7 && currentHour < 19) ? 70 : 45;

      sensors.forEach(pos => {
        const base = (currentHour >= 7 && currentHour < 19) ? 60 : 30;
        const noise = base + Math.random() * 30;
        
        // Define colors with 0.7 (70%) transparency
        let rgbaColor = noise > norm + 10 ? 'rgba(255, 77, 77, 0.7)' : 
                       (noise > norm ? 'rgba(255, 165, 0, 0.7)' : 'rgba(46, 204, 113, 0.7)');

        L.marker(pos, {
          icon: L.divIcon({
            className: 'sensor-rect',
            html: `<div style="width:100%; height:100%; background-color:${rgbaColor}; border-radius:4px;"></div>`,
            iconSize: [50, 20]
          })
        }).addTo(markersLayer);
      });

      currentHour = (currentHour + 1) % 24;
    }

    setInterval(animateMap, 800);
    animateMap();
  </script>
</body>
</html>
