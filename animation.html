<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noise Map Animation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; background-color: #111; }
    #map { height: 100vh; transition: filter 0.5s ease; }
    
    .pulsing-icon div {
      width: 20px; height: 20px; border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0.4); }
      70% { transform: scale(1.4); box-shadow: 0 0 0 10px rgba(0,0,0,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    }

    #clock {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      background: rgba(0,0,0,0.7); color: white; padding: 15px;
      font-family: sans-serif; font-size: 20px; border-radius: 8px;
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div id="clock">Time: 00:00</div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { maxZoom: 18 }).setView([51.9191, 4.4801], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    
    // Create 5 dummy sensors for demonstration
    const sensors = [
      [51.922, 4.475], [51.918, 4.480], [51.920, 4.485], [51.915, 4.470], [51.925, 4.490]
    ];

    let currentHour = 0; // 0 to 23

    function animateMap() {
      // 1. Calculate Brightness (0.3 = Night, 1.0 = Day)
      const brightness = 0.65 + 0.35 * Math.cos(((currentHour - 12) / 24) * 2 * Math.PI);
      document.getElementById('map').style.filter = `brightness(${brightness})`;
      
      // 2. Update Clock UI
      document.getElementById('clock').innerText = `Time: ${currentHour.toString().padStart(2, '0')}:00`;

      // 3. Update Markers
      markersLayer.clearLayers();
      const norm = (currentHour >= 7 && currentHour < 19) ? 70 : 45;

      sensors.forEach(pos => {
        // Fake dynamic noise: higher during day (roughly 50-80dB)
        const base = (currentHour >= 7 && currentHour < 19) ? 60 : 30;
        const noise = base + Math.random() * 30;
        
        let color = noise > norm + 10 ? 'red' : (noise > norm ? 'orange' : 'green');

        L.marker(pos, {
          icon: L.divIcon({
            className: 'pulsing-icon',
            html: `<div style="background:${color}"></div>`,
            iconSize: [20, 20]
          })
        }).addTo(markersLayer);
      });

      // Increment time
      currentHour = (currentHour + 1) % 24;
    }

    // Run animation loop every 800ms
    setInterval(animateMap, 800);
    animateMap();
  </script>
</body>
</html>
