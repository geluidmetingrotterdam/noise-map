<!DOCTYPE html>
<html>
<head>
    <title>Rotterdam Health Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin:0; padding:0; background: #000; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* The Overlay: This will darken the map without touching markers */
        #dark-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 600; /* Between map and markers */
            pointer-events: none; transition: background 1s ease;
        }

        /* Marker Glow CSS */
        .glow-marker {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: rgb(var(--marker-rgb));
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(var(--marker-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0); }
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="dark-overlay"></div> <script>
    const map = L.map('map', { zoomControl: false }).setView([51.9225, 4.47917], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    let currentHour = 0; 

    function updateMap() {
        // 1. Natural Dimming Logic (0.0 = Light overlay, 0.7 = Dark overlay)
        let opacity = 0.0;
        if (currentHour >= 5 && currentHour < 7) opacity = 0.5 - (currentHour - 5) * 0.25;
        else if (currentHour >= 7 && currentHour < 18) opacity = 0.0;
        else if (currentHour >= 18 && currentHour < 20) opacity = (currentHour - 18) * 0.25;
        else opacity = 0.5;
        
        document.getElementById('dark-overlay').style.background = `rgba(0,0,0,${opacity})`;

        // 2. Refresh Markers
        markersLayer.clearLayers();
        const dummyData = [[51.922, 4.479], [51.925, 4.485], [51.918, 4.470]];
        
        dummyData.forEach(coord => {
            const intensity = Math.random();
            const colorRgb = intensity > 0.6 ? '255, 0, 0' : (intensity > 0.3 ? '255, 255, 0' : '0, 255, 255');
            
            L.marker(coord, {
                icon: L.divIcon({
                    className: 'glow-marker',
                    html: `<div style="--marker-rgb: ${colorRgb};"></div>`,
                    iconSize: [12, 12]
                })
            }).addTo(markersLayer);
        });

        currentHour = (currentHour + 1) % 24;
    }

    setInterval(updateMap, 800);
    updateMap();
</script>
</body>
</html>
