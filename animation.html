<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noise Map Animation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; background-color: #000; }
    #map { height: 100vh; }
    
    /* Map dims, markers stay bright */
    .leaflet-tile-pane {
      transition: filter 0.5s ease;
    }

    .pulsing-icon div {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid white;
      animation: pulse 1.5s infinite;
      /* This gets updated by the JS via style attribute */
      background: rgb(var(--marker-color-rgb));
    }

    @keyframes pulse {
      0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(var(--marker-color-rgb), 0.7); }
      70% { transform: scale(1.4); box-shadow: 0 0 0 15px rgba(var(--marker-color-rgb), 0); }
      100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(var(--marker-color-rgb), 0); }
    }

    #clock {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      background: rgba(0,0,0,0.7); color: white; padding: 15px;
      font-family: sans-serif; font-size: 20px; border-radius: 8px;
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div id="clock">Time: 00:00</div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { maxZoom: 18 }).setView([51.9191, 4.4801], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    const sensors = [
      [51.922, 4.475], [51.918, 4.480], [51.920, 4.485], [51.915, 4.470], [51.925, 4.490]
    ];

    let currentHour = 0; 

    function animateMap() {
      // 1. Natural Brightness Logic
      let brightness = 1.0;
      if (currentHour >= 5 && currentHour < 7) brightness = 0.3 + (currentHour - 5) * 0.35;
      else if (currentHour >= 7 && currentHour < 18) brightness = 1.0;
      else if (currentHour >= 18 && currentHour < 20) brightness = 1.0 - (currentHour - 18) * 0.35;
      else brightness = 0.3;

      const tilePane = document.querySelector('.leaflet-tile-pane');
      if (tilePane) tilePane.style.filter = `brightness(${brightness})`;
      
      // 2. Update Clock
      document.getElementById('clock').innerText = `Time: ${currentHour.toString().padStart(2, '0')}:00`;

      // 3. Update Markers
      markersLayer.clearLayers();
      const norm = (currentHour >= 7 && currentHour < 19) ? 70 : 45;

      sensors.forEach(pos => {
        const base = (currentHour >= 7 && currentHour < 19) ? 60 : 30;
        const noise = base + Math.random() * 30;
        
        let colorRgb = '0, 128, 0'; // Green
        if (noise > norm + 10) colorRgb = '255, 0, 0'; // Red
        else if (noise > norm) colorRgb = '255, 165, 0'; // Orange

        L.marker(pos, {
          icon: L.divIcon({
            className: 'pulsing-icon',
            html: `<div style="--marker-color-rgb: ${colorRgb};"></div>`,
            iconSize: [20, 20]
          })
        }).addTo(markersLayer);
      });

      currentHour = (currentHour + 1) % 24;
    }

    // Set to 800ms for a comfortable animation speed for recording
    setInterval(animateMap, 800);
    animateMap();
  </script>
</body>
</html>
