<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noise Map Animation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; background-color: #111; }
    #map { height: 100vh; }
    .leaflet-tile-pane { transition: filter 0.5s ease; }
    
    .pulsing-icon div {
      width: 20px; height: 20px; border-radius: 50%;
      opacity: 0.8;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0.7); }
      70% { transform: scale(1.6); box-shadow: 0 0 0 15px rgba(var(--marker-rgb), 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0); }
    }

    /* Split-Flap Clock Styling */
    #clock-container {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      background: #222; padding: 10px; border-radius: 4px;
      font-family: 'Courier New', Courier, monospace; 
      font-weight: bold; color: #fff;
      display: flex; gap: 4px;
    }
    .flap {
      background: #333; padding: 5px 8px; border-radius: 2px;
      border-bottom: 2px solid #000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div id="clock-container">
    <div id="day-flap" class="flap">Maandag</div>
    <div id="time-flap" class="flap">00:00</div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { maxZoom: 18 }).setView([51.9191, 4.4801], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    const sensors = [[51.922, 4.475], [51.918, 4.480], [51.920, 4.485], [51.915, 4.470], [51.925, 4.490]];
    const days = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];
    
    let currentHour = 0; 
    let currentDayIndex = 0;

    function animateMap() {
      const brightness = 0.65 + 0.35 * Math.cos(((currentHour - 12) / 24) * 2 * Math.PI);
      const tilePane = document.querySelector('.leaflet-tile-pane');
      if (tilePane) tilePane.style.filter = `brightness(${brightness})`;
      
      // Update Split-Flap UI
      document.getElementById('day-flap').innerText = days[currentDayIndex];
      document.getElementById('time-flap').innerText = `${currentHour.toString().padStart(2, '0')}:00`;

      // Update Markers
      markersLayer.clearLayers();
      const norm = (currentHour >= 7 && currentHour < 19) ? 70 : 45;
      sensors.forEach(pos => {
        const base = (currentHour >= 7 && currentHour < 19) ? 60 : 30;
        const noise = base + Math.random() * 30;
        let colorRgb = noise > norm + 10 ? '255, 0, 0' : (noise > norm ? '255, 165, 0' : '46, 204, 113');

        L.marker(pos, {
          icon: L.divIcon({
            className: 'pulsing-icon',
            html: `<div style="background: rgb(${colorRgb}); --marker-rgb: ${colorRgb};"></div>`,
            iconSize: [20, 20]
          })
        }).addTo(markersLayer);
      });

      // Increment logic
      currentHour++;
      if (currentHour >= 24) {
        currentHour = 0;
        currentDayIndex = (currentDayIndex + 1) % 7;
      }
    }

    setInterval(animateMap, 800);
    animateMap();
  </script>
</body>
</html>
