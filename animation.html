<!DOCTYPE html>
<html>
<head>
    <title>Rotterdam Health & Environmental Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin:0; padding:0; background: #000; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }

        /* This only dims the background map, not the markers */
        .leaflet-tile-pane { transition: filter 1s ease; }

        /* The pulsing marker with white border */
        .glow-marker {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 2px solid white;
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(var(--marker-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0); }
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const map = L.map('map', { zoomControl: false }).setView([51.9225, 4.47917], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    let currentHour = 0; 

    function updateMap() {
        // 1. Calculate Brightness (1.0 = Day, 0.3 = Night)
        let brightness = 1.0;
        if (currentHour >= 5 && currentHour < 7) brightness = 0.3 + (currentHour - 5) * 0.35;
        else if (currentHour >= 7 && currentHour < 18) brightness = 1.0;
        else if (currentHour >= 18 && currentHour < 20) brightness = 1.0 - (currentHour - 18) * 0.35;
        else brightness = 0.3;
        
        // Target only the map tiles
        const tilePane = document.querySelector('.leaflet-tile-pane');
        if (tilePane) tilePane.style.filter = `brightness(${brightness})`;

        // 2. Refresh Markers
        markersLayer.clearLayers();
        const dummyData = [[51.922, 4.479], [51.925, 4.485], [51.918, 4.470]];
        
        dummyData.forEach(coord => {
            const intensity = Math.random();
            const colorRgb = intensity > 0.6 ? '255, 0, 0' : (intensity > 0.3 ? '255, 255, 0' : '0, 255, 255');
            
            L.marker(coord, {
                icon: L.divIcon({
                    className: 'glow-marker',
                    html: `<div style="width:100%; height:100%; border-radius:50%; background:rgb(${colorRgb}); --marker-rgb: ${colorRgb};"></div>`,
                    iconSize: [12, 12]
                })
            }).addTo(markersLayer);
        });

        currentHour = (currentHour + 1) % 24;
    }

    setInterval(updateMap, 800);
    updateMap();
</script>
</body>
</html>
