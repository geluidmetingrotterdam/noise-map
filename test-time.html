<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Noise Map v.2026-FINAL</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; background-color: #111; }
    #map { height: 100vh; transition: filter 0.5s ease; }
    
    .pulsing-icon div { width: 20px; height: 20px; border-radius: 50%; opacity: 0.7; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0.7); } 70% { transform: scale(1.8); box-shadow: 0 0 0 15px rgba(var(--marker-rgb), 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--marker-rgb), 0); } }

    /* STABLE UI STYLING */
    #clock-container {
        position: fixed; top: 20px; right: 20px; z-index: 1000;
        background: #000; padding: 15px; border-radius: 8px;
    }
    .flap-card {
        background: #222; color: #fff;
        /* Monospace font ensures every letter is the same width */
        font-family: 'Courier New', Courier, monospace;
        font-size: 30px;
        padding: 10px 15px; border-bottom: 3px solid #000; border-radius: 4px;
        /* Width fixed for 'DONDERDAG' (approx 210px) */
        min-width: 210px; 
        /* Right-aligning locks the text in place */
        text-align: right;
        position: relative;
    }
    .flap-card::after { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #000; }
    .version-tag { font-size: 10px; color: #666; text-align: right; margin-top: 5px; }
  </style>
</head>
<body>

  <div id="map"></div>
  <div id="clock-container">
    <div id="day-flap" class="flap-card">MAANDAG</div>
    <div id="time-flap" class="flap-card" style="margin-top:5px;">00:00</div>
    <div class="version-tag">v.2026-FINAL</div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { maxZoom: 18 }).setView([51.9191, 4.4801], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    const sensors = [[51.922, 4.475], [51.918, 4.480], [51.920, 4.485], [51.915, 4.470], [51.925, 4.490]];
    const days = ["MAANDAG", "DINSDAG", "WOENSDAG", "DONDERDAG", "VRIJDAG", "ZATERDAG", "ZONDAG"];
    
    let currentHour = 0; 
    let currentDayIndex = 0;

    function animateMap() {
      const brightness = 0.65 + 0.35 * Math.cos(((currentHour - 12) / 24) * 2 * Math.PI);
      const tilePane = document.querySelector('.leaflet-tile-pane');
      if (tilePane) tilePane.style.filter = `brightness(${brightness})`;
      
      document.getElementById('day-flap').innerText = days[currentDayIndex];
      document.getElementById('time-flap').innerText = `${currentHour.toString().padStart(2, '0')}:00`;

      markersLayer.clearLayers();
      sensors.forEach(pos => {
        const noise = Math.random() * 100;
        let colorRgb = noise > 80 ? '255, 0, 0' : (noise > 50 ? '255, 165, 0' : '46, 204, 113');
        L.marker(pos, {
          icon: L.divIcon({
            className: 'pulsing-icon',
            html: `<div style="background: rgb(${colorRgb}); --marker-rgb: ${colorRgb};"></div>`,
            iconSize: [20, 20]
          })
        }).addTo(markersLayer);
      });

      currentHour++;
      if (currentHour >= 24) { currentHour = 0; currentDayIndex = (currentDayIndex + 1) % 7; }
    }

    setInterval(animateMap, 800);
    animateMap();
  </script>
</body>
</html>
