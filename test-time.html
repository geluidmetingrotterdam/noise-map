<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .flap {
            position: relative;
            background: #333;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 40px;
            font-weight: bold;
            padding: 20px;
            border-radius: 4px;
            min-width: 140px;
            text-align: center;
            overflow: hidden;
            /* Create the middle line */
            border-bottom: 2px solid #000;
        }

        /* The animation class that triggers the "flip" */
        .flipping {
            animation: flip 0.6s ease-in-out;
        }

        @keyframes flip {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(90deg); opacity: 0.5; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="flap" id="day-flap">MAANDAG</div>
    <div class="flap" id="time-flap" style="margin-left: 10px;">00:00</div>

    <script>
        const days = ["MAANDAG", "DINSDAG", "WOENSDAG", "DONDERDAG", "VRIJDAG", "ZATERDAG", "ZONDAG"];
        let hour = 0;
        let dayIdx = 0;

        function updateClock() {
            const dayEl = document.getElementById('day-flap');
            const timeEl = document.getElementById('time-flap');

            // Trigger the animation
            dayEl.classList.add('flipping');
            timeEl.classList.add('flipping');

            setTimeout(() => {
                dayEl.innerText = days[dayIdx];
                timeEl.innerText = hour.toString().padStart(2, '0') + ":00";
            }, 300); // Change text halfway through the flip

            setTimeout(() => {
                dayEl.classList.remove('flipping');
                timeEl.classList.remove('flipping');
            }, 600);
            
            hour++;
            if (hour >= 24) {
                hour = 0;
                dayIdx = (dayIdx + 1) % days.length;
            }
        }

        setInterval(updateClock, 1200);
        updateClock();
    </script>
</body>
</html>
