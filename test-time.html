<!DOCTYPE html>
<html>
<head>
<style>
    :root { --flap-bg: #222; --flap-text: #fff; }
    
    .flap-board { display: flex; gap: 4px; font-family: monospace; }
    
    .char-container {
        position: relative; width: 60px; height: 80px;
        perspective: 500px; /* Needed for 3D flip */
    }

    .flap {
        position: absolute; width: 100%; height: 50%;
        background: var(--flap-bg); color: var(--flap-text);
        display: flex; justify-content: center; align-items: center;
        overflow: hidden; font-size: 50px; font-weight: bold;
    }

    .top { top: 0; border-radius: 4px 4px 0 0; }
    .bottom { bottom: 0; border-radius: 0 0 4px 4px; align-items: flex-end; }
    
    /* The line in the middle */
    .hinge {
        position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
        background: #000; z-index: 10;
    }

    /* The flip animation */
    .flipping { animation: flip-bottom 0.6s ease-in; }
    @keyframes flip-bottom {
        0% { transform: rotateX(0deg); }
        100% { transform: rotateX(-90deg); }
    }
</style>
</head>
<body>

    <div class="flap-board">
        <div class="char-container" id="flap1">
            <div class="flap top" id="top">M</div>
            <div class="flap bottom" id="bottom">M</div>
            <div class="hinge"></div>
        </div>
    </div>

    <script>
        function triggerFlip(newChar) {
            const bottom = document.getElementById('bottom');
            bottom.classList.add('flipping');
            
            setTimeout(() => {
                bottom.innerText = newChar;
                bottom.classList.remove('flipping');
            }, 300);
        }
        
        // Example: flip after 1 second
        setInterval(() => triggerFlip('D'), 2000);
    </script>
</body>
</html>
