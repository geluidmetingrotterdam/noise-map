<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    
    /* The main wrapper */
    .flap-card {
        position: relative;
        width: 160px; height: 100px;
        background: #000;
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        font-size: 40px; font-weight: bold; color: #fff;
        display: flex; justify-content: center; align-items: center;
        overflow: hidden;
        border: 4px solid #333;
    }

    /* The line in the middle */
    .flap-card::after {
        content: "";
        position: absolute;
        top: 50%; left: 0; width: 100%; height: 2px;
        background: rgba(0,0,0,0.5);
        z-index: 2;
    }

    /* Animation class */
    .flipping { animation: flip 0.6s ease-in-out; }

    @keyframes flip {
        0% { transform: rotateX(0deg); }
        50% { transform: rotateX(90deg); }
        100% { transform: rotateX(0deg); }
    }
</style>
</head>
<body>

    <div id="day-flap" class="flap-card">MAANDAG</div>
    <div id="time-flap" class="flap-card" style="margin-left: 20px;">00:00</div>

    <script>
        const days = ["MAANDAG", "DINSDAG", "WOENSDAG", "DONDERDAG", "VRIJDAG", "ZATERDAG", "ZONDAG"];
        let hour = 0;
        let dayIdx = 0;

        function flip() {
            const dayEl = document.getElementById('day-flap');
            const timeEl = document.getElementById('time-flap');

            dayEl.classList.add('flipping');
            timeEl.classList.add('flipping');

            setTimeout(() => {
                dayEl.innerText = days[dayIdx];
                timeEl.innerText = hour.toString().padStart(2, '0') + ":00";
            }, 300);

            setTimeout(() => {
                dayEl.classList.remove('flipping');
                timeEl.classList.remove('flipping');
            }, 600);
            
            hour++;
            if (hour >= 24) {
                hour = 0;
                dayIdx = (dayIdx + 1) % days.length;
            }
        }

        setInterval(flip, 1200);
    </script>
</body>
</html>
