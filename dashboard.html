<script>
    let globalSensorsData = []; 
    let currentFilter = 'all';

    function renderDashboard(sensors) {
        const tableBody = document.getElementById('sensor-table-body');
        const totalCount = document.getElementById('total-count');
        const onlineCount = document.getElementById('online-count');
        const offlineCount = document.getElementById('offline-count');

        const total = sensors.length;
        const online = sensors.filter(s => s.isOnline).length;
        const offline = total - online;

        totalCount.innerText = total;
        onlineCount.innerText = online;
        offlineCount.innerText = offline;

        const filteredSensors = sensors.filter(s => {
            if (currentFilter === 'offline') return !s.isOnline;
            return true;
        });

        if(filteredSensors.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No sensors found matching this filter.</td></tr>`;
            return;
        }

        tableBody.innerHTML = filteredSensors.map(sensor => `
            <tr>
                <td><strong>#${sensor.id}</strong></td>
                <td><strong>${sensor.dB} dB</strong></td>
                <td>
                    <span class="status-badge ${sensor.isOnline ? 'online' : 'offline'}">
                        ${sensor.isOnline ? 'Online' : 'Offline'}
                    </span>
                </td>
                <td>${sensor.lastSeen}</td>
                <td class="actions">
                    <a href="https://api-rrd.madavi.de:3000/grafana/d/000000004/single-sensor-view?orgId=1&var-node=${sensor.id}" target="_blank">📊 Historical Chart</a>
                    <a href="https://www.google.com/maps/search/?api=1&query=${sensor.lat},${sensor.lon}" target="_blank">📍 View Position</a>
                </td>
            </tr>
        `).join('');
    }

    function filterSensors(filterType) {
        currentFilter = filterType;
        document.getElementById('btn-all').classList.toggle('active', filterType === 'all');
        document.getElementById('btn-offline').classList.toggle('active', filterType === 'offline');
        renderDashboard(globalSensorsData);
    }

    async function fetchRotterdamData() {
        try {
            const response = await fetch('https://data.sensor.community/static/v2/data.json');
            if (!response.ok) throw new Error("API status error");
            const data = await response.json();

            const tempMap = new Map();

            data.forEach(entry => {
                const lat = entry.location.latitude;
                const lon = entry.location.longitude;

                // Precision Rotterdam bounding box from your map configuration
                if (lat > 51.89 && lat < 51.93 && lon > 4.44 && lon < 4.55) {
                    const noiseVal = entry.sensordatavalues.find(val =>
                        val.value_type.toLowerCase().includes("noise") || 
                        val.value_type.toLowerCase().includes("spl")
                    );

                    if (noiseVal) {
                        const sensorId = (entry.sensor.sensor_id || entry.sensor.id).toString();
                        const dB = parseFloat(noiseVal.value).toFixed(1);
                        
                        // Force JavaScript to read the API timestamp explicitly as UTC
                        const apiTimeStr = entry.timestamp.endsWith('Z') ? entry.timestamp : entry.timestamp + 'Z';
                        const lastSeenTime = new Date(apiTimeStr);
                        
                        // Compare the fixed UTC timestamp against the current real time
                        const timeDifferenceMinutes = (new Date() - lastSeenTime) / (1000 * 60);
                        const isOnline = timeDifferenceMinutes < 20; // Online if updated within last 20 mins

                        // Format timestamp cleanly into local user time for your display table
                        const localTimeDisplay = lastSeenTime.toLocaleString();

                        if (!tempMap.has(sensorId) || new Date(tempMap.get(sensorId).rawTime) < lastSeenTime) {
                            tempMap.set(sensorId, {
                                id: sensorId,
                                dB: dB,
                                lat: lat,
                                lon: lon,
                                lastSeen: localTimeDisplay,
                                rawTime: apiTimeStr,
                                isOnline: isOnline
                            });
                        }
                    }
                }
            });

            globalSensorsData = Array.from(tempMap.values());
            
            // Sort list cleanly by numeric ID sequence
            globalSensorsData.sort((a, b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
            
            renderDashboard(globalSensorsData);

        } catch (error) {
            console.error("Dashboard processing failure:", error);
            document.getElementById('sensor-table-body').innerHTML = `
                <tr><td colspan="5" style="text-align:center; color:red; padding:20px;">
                    Failed to sync with Sensor.community feed. Retrying shortly...
                </td></tr>`;
        }
    }

    window.onload = () => {
        fetchRotterdamData();
        setInterval(fetchRotterdamData, 60000); // Refreshes automatically every minute
    };
</script>
