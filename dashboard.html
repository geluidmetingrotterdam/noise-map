<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotterdam Noise Sensor Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --online-color: #2ec4b6;
            --offline-color: #e71d36;
            --accent-color: #011627;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 15px;
        }

        h1 { margin: 0; color: var(--accent-color); }

        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .card h3 { margin: 0 0 10px 0; color: #666; font-size: 0.9rem; text-transform: uppercase; }
        .card .value { font-size: 2rem; font-weight: bold; }
        .card.online .value { color: var(--online-color); }
        .card.offline .value { color: var(--offline-color); }

        /* Controls / Filtering */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            background-color: #ddd;
            transition: background 0.2s;
        }

        .btn.active, .btn:hover { background-color: var(--accent-color); color: white; }
        .btn-offline.active { background-color: var(--offline-color); color: white; }

        /* Sensor Table */
        .table-container {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td { padding: 15px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #555; }

        .status-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-badge.online { background-color: #d1f7ec; color: #0f785c; }
        .status-badge.offline { background-color: #fcd5d9; color: #b71c1c; }

        .actions a {
            color: #0077cc;
            text-decoration: none;
            font-weight: 500;
            margin-right: 15px;
        }
        .actions a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Noise Sensor Dashboard</h1>
            <p>Rotterdam Centrum Monitoring</p>
        </div>
        <a href="https://geluidmetingrotterdam.github.io/noise-map/" target="_blank" style="text-decoration: none; font-weight: bold; color: #0077cc;">← Back to Map</a>
    </header>

    <div class="summary-cards">
        <div class="card">
            <h3>Rotterdam Sensors Detected</h3>
            <div class="value" id="total-count">0</div>
        </div>
        <div class="card online">
            <h3>Online (Last 30m)</h3>
            <div class="value" id="online-count">0</div>
        </div>
        <div class="card offline">
            <h3>Offline</h3>
            <div class="value" id="offline-count">0</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn active" id="btn-all" onclick="filterSensors('all')">Show All</button>
        <button class="btn btn-offline" id="btn-offline" onclick="filterSensors('offline')">Show Offline Only 🚨</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Sensor ID</th>
                    <th>Latest Value</th>
                    <th>Status</th>
                    <th>Last Active (Local Time)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="sensor-table-body">
                <tr><td colspan="5" style="text-align:center;">Fetching live data from Sensor.community feed... (this can take a few seconds)</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let globalSensorsData = []; 
    let currentFilter = 'all';

    function renderDashboard(sensors) {
        const tableBody = document.getElementById('sensor-table-body');
        const totalCount = document.getElementById('total-count');
        const onlineCount = document.getElementById('online-count');
        const offlineCount = document.getElementById('offline-count');

        const total = sensors.length;
        const online = sensors.filter(s => s.isOnline).length;
        const offline = total - online;

        totalCount.innerText = total;
        onlineCount.innerText = online;
        offlineCount.innerText = offline;

        const filteredSensors = sensors.filter(s => {
            if (currentFilter === 'offline') return !s.isOnline;
            return true;
        });

        if(filteredSensors.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No sensors found matching this filter.</td></tr>`;
            return;
        }

        tableBody.innerHTML = filteredSensors.
