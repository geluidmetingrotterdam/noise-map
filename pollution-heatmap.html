<!DOCTYPE html>
<html>
<head>
    <title>Rotterdam Aggravated Health Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Heatmap Plugin -->
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        body { margin:0; padding:0; background: #1a1a1a; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #dashboard { 
            position: absolute; top: 20px; right: 20px; z-index: 1000; 
            background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 8px; 
            border: 1px solid #444; width: 220px;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: #ff4d4d; }
    </style>
</head>
<body>

<div id="dashboard">
    <h2>Health Stress Index</h2>
    <div id="status" style="font-size: 12px; margin-bottom: 10px;">Scanning Rotterdam API...</div>
    <div class="legend-item"><span class="dot" style="background: red;"></span> High Aggravation</div>
    <div class="legend-item"><span class="dot" style="background: yellow;"></span> Moderate Risk</div>
    <div class="legend-item"><span class="dot" style="background: cyan;"></span> Low Exposure</div>
</div>

<div id="map"></div>

<script>
    // 1. Initialize Map
    const map = L.map('map').setView([51.9225, 4.47917], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 2. The JSONP Callback Function
    // This function will be triggered automatically when the data arrives
    window.handleSmartCitizenData = function(data) {
        const statusEl = document.getElementById('status');
        let heatPoints = [];

        // SmartCitizen returns an array of devices
        if (data && data.length > 0) {
            statusEl.innerText = `Processing ${data.length} sensors...`;
            
            data.forEach(device => {
                // Since JSONP for details is complex, we use the "last_reading" 
                // provided in the main search if available, or estimated weights.
                // For a robust heatmap, we use the device's basic activity level
                if (device.latitude && device.longitude) {
                    // We generate a base intensity from the 'updated_at' 
                    // to show active vs inactive sensors
                    const activityLevel = device.data ? 1.0 : 0.5; 
                    heatPoints.push([device.latitude, device.longitude, activityLevel]);
                }
            });

            L.heatLayer(heatPoints, {
                radius: 35, blur: 20, max: 1.0,
                gradient: {0.2: 'blue', 0.4: 'cyan', 0.6: 'lime', 0.8: 'yellow', 1: 'red'}
            }).addTo(map);
            
            statusEl.innerText = `Live: ${heatPoints.length} sites mapped`;
        } else {
            statusEl.innerText = "No data found for Rotterdam.";
        }
    };

    // 3. Inject the JSONP Script
    function loadData() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Requesting JSONP Stream...";
        
        const script = document.createElement('script');
        // The 'callback' parameter is the secret key here
        script.src = "https://api.smartcitizen.me/v0/devices?q[city_cont]=Rotterdam&callback=handleSmartCitizenData";
        
        script.onerror = function() {
            statusEl.innerText = "JSONP Blocked. Try a different browser.";
        };
        
        document.body.appendChild(script);
    }

    loadData();
</script>
</body>
</html>
