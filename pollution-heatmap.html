<script>
    const map = L.map('map', { zoomControl: false }).setView([51.9225, 4.47917], 13);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB'
    }).addTo(map);

    async function loadData() {
        const statusEl = document.getElementById('status');
        try {
            // No proxy needed anymore! We are reading your local file.
            const response = await fetch('data.json');
            if (!response.ok) throw new Error("Data file not found");
            
            const devices = await response.json();
            let heatPoints = [];

            devices.forEach(d => {
                if (d.latitude && d.longitude && d.last_reading) {
                    // Pulling real-time PM2.5 and Noise
                    const pm = d.last_reading['pm2.5'] || 10;
                    const noise = d.last_reading['noise'] || 45;
                    
                    // Aggravation Logic: (PM / Limit) + (Noise / Limit)
                    const intensity = (pm / 35) + (noise / 75);
                    heatPoints.push([d.latitude, d.longitude, intensity]);
                }
            });

            L.heatLayer(heatPoints, {
                radius: 45,
                blur: 25,
                max: 1.5,
                gradient: {0.2: 'cyan', 0.5: 'lime', 0.8: 'yellow', 1.0: 'red'}
            }).addTo(map);

            statusEl.innerText = "● Live Status: " + heatPoints.length + " Sensors Active";
            statusEl.style.color = "#00ff00";

        } catch (e) {
            console.error(e);
            statusEl.innerText = "Data Offline (Check Actions Tab)";
            statusEl.style.color = "orange";
        }
    }

    loadData();
</script>
