<!DOCTYPE html>
<html>
<head>
    <title>Rotterdam Live Sensor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; }
        #map { height: 100vh; width: 100vw; }
        #status {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: white; padding: 10px 15px;
            font-family: monospace; border-radius: 5px; border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div id="status">Connecting to Rotterdam Sensor...</div>
    <div id="map"></div>

    <!-- Leaflet and Heatmap Plugin -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <script>
        // 1. Initialize Map centered on Rotterdam
        const map = L.map('map', { zoomControl: false }).setView([51.9225, 4.47917], 13);
        
        // 2. Add Dark Mode Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function fetchLastReading() {
            const statusEl = document.getElementById('status');
            
            // REPLACE THIS NUMBER with your actual Device ID from the SmartCitizen URL
            const deviceId = '12345'; 

            try {
                // Fetch only the most recent data point from the API
                const response = await fetch(`https://api.smartcitizen.org/v0/devices/${deviceId}`);
                if (!response.ok) throw new Error("Device not found");
                
                const device = await response.json();
                
                // Get Coordinates
                const lat = device.latitude;
                const lng = device.longitude;

                // Get PM2.5 value from the sensors array
                const pmSensor = device.data.sensors.find(s => s.name.includes("PM2.5"));
                const pmValue = pmSensor ? pmSensor.value : 0;
                const lastSeen = new Date(device.last_reading_at).toLocaleTimeString();

                // 3. Add Heatmap Point
                // We normalize the intensity (PM2.5 of 35+ is considered "heavy")
                const intensity = Math.min(pmValue / 35, 1.0);
                L.heatLayer([[lat, lng, intensity]], {
                    radius: 60, blur: 40, max: 1.0,
                    gradient: {0.4: 'cyan', 0.6: 'yellow', 1.0: 'red'}
                }).addTo(map);

                // 4. Update Status and Move Map
                map.flyTo([lat, lng], 15);
                statusEl.innerHTML = `● LIVE: ${pmValue} µg/m³ (PM2.5)<br><small>Last Update: ${lastSeen}</small>`;
                statusEl.style.color = "#00ff00";

            } catch (error) {
                console.error(error);
                statusEl.innerText = "Error: Could not reach sensor.";
                statusEl.style.color = "#ff4d4d";
            }
        }

        fetchLastReading();
    </script>
</body>
</html>
