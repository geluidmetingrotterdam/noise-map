<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotterdam Live Sensor Network</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #0f1215; color: #e0e0e0; font-family: 'Inter', system-ui, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        #dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(13, 17, 23, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            min-width: 220px;
        }

        .status-dot {
            height: 10px; width: 10px; background-color: #238636;
            border-radius: 50%; display: inline-block; margin-right: 8px;
            box-shadow: 0 0 8px #238636;
        }

        h2 { margin: 0 0 10px 0; font-size: 18px; color: #f0f6fc; }
        .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 22px; font-weight: bold; color: #58a6ff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h2><span class="status-dot"></span> Rotterdam Live</h2>
        <div class="stat-label">Sensors Found</div>
        <div id="count" class="stat-value">0</div>
        <div id="status-text" style="font-size: 13px; color: #8b949e;">Fetching data from smartcitizen.me...</div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS and Heatmap Plugin -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.0.1/leaflet-heat.js"></script>

    <script>
        // Initialize Map (Starting center, will adjust automatically)
        const map = L.map('map', { zoomControl: false }).setView([51.9225, 4.47917], 12);
        
        // Add Dark Mode CartoDB Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; SmartCitizen'
        }).addTo(map);

        async function loadRotterdamNetwork() {
            const statusText = document.getElementById('status-text');
            const countEl = document.getElementById('count');
            
            // Correct Path: api + .me + tags (plural)
            const url = 'https://api.smartcitizen.me/v0/devices?tags=rotterdam';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const devices = await response.json();
                let heatPoints = [];
                let markers = [];

                devices.forEach(device => {
                    // Only process devices with geographic coordinates
                    if (device.latitude && device.longitude) {
                        
                        // Find the PM2.5 sensor if it exists
                        const pmSensor = device.data.sensors.find(s => 
                            s.name.toLowerCase().includes("pm2.5") || 
                            s.name.toLowerCase().includes("particulate")
                        );
                        
                        const val = pmSensor ? pmSensor.value : 0;
                        
                        // Create heatmap point: [lat, lng, intensity]
                        // Higher PM2.5 = higher intensity (normalized against 35 ug/m3)
                        const intensity = Math.min(val / 35, 1.0) || 0.4; 
                        heatPoints.push([device.latitude, device.longitude, intensity]);
                        
                        // Create a point for auto-zooming
                        markers.push(L.latLng(device.latitude, device.longitude));

                        // Add individual pulse circles
                        L.circleMarker([device.latitude, device.longitude], {
                            radius: 6,
                            fillColor: "#58a6ff",
                            color: "#fff",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map).bindPopup(`<b>${device.name}</b><br>PM2.5: ${val.toFixed(1)} µg/m³`);
                    }
                });

                if (heatPoints.length > 0) {
                    // Initialize Heatmap Layer
                    L.heatLayer(heatPoints, {
                        radius: 50,
                        blur: 30,
                        max: 1.0,
                        gradient: {0.4: 'cyan', 0.6: 'lime', 0.8: 'yellow', 1.0: 'red'}
                    }).addTo(map);

                    // Auto-adjust map to fit all found sensors
                    const bounds = L.latLngBounds(markers);
                    map.fitBounds(bounds, { padding: [50, 50] });

                    countEl.innerText = heatPoints.length;
                    statusText.innerText = "All sensors mapped successfully.";
                } else {
                    statusText.innerText = "No sensors found with 'rotterdam' tag.";
                }

            } catch (error) {
                console.error("Dashboard Error:", error);
                statusText.innerHTML = "<span style='color:#ff7b72'>Error connecting to API</span>";
            }
        }

        // Run on load
        loadRotterdamNetwork();

        // Optional: Refresh data every 10 minutes
        setInterval(loadRotterdamNetwork, 600000);
    </script>
</body>
</html>
