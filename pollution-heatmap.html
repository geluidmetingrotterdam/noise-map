<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotterdam Live Air Quality</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; background: #0d1117; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: #161b22; padding: 20px; border-radius: 8px;
            border: 1px solid #30363d; min-width: 220px;
        }
        .big { font-size: 38px; font-weight: bold; color: #58a6ff; }
        .label { font-size: 11px; letter-spacing: 1px; color: #8b949e; }
    </style>
</head>
<body>

<div id="ui">
    <div class="label">ROTTERDAM NETWORK</div>
    <div id="count" class="big">--</div>
    <div id="msg" style="font-size: 12px;">Connecting...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.0.1/leaflet-heat.js"></script>

<script>
    // 1. Setup Map - Set high z-index for markers
    const map = L.map('map', { zoomControl: false }).setView([51.92, 4.47], 12);

    // 2. Add Tiles (Lower Pane)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        pane: 'tilePane'
    }).addTo(map);

    async function init() {
        const msg = document.getElementById('msg');
        const count = document.getElementById('count');
        const url = 'https://api.smartcitizen.me/v0/devices?near=51.9225,4.4791&radius=15000';

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data || data.length === 0) {
                msg.innerText = "No sensors found.";
                return;
            }

            let heatPoints = [];
            let bounds = L.latLngBounds(); // To track where sensors are

            data.forEach(d => {
                if (d.latitude && d.longitude) {
                    const pmSensor = d.data.sensors.find(s => s.name.includes("PM2.5"));
                    const pmValue = pmSensor ? pmSensor.value : 5;
                    
                    heatPoints.push([d.latitude, d.longitude, 1.0]); // Set max intensity to ensure visibility
                    bounds.extend([d.latitude, d.longitude]);

                    // Add markers with a bright color
                    L.circleMarker([d.latitude, d.longitude], {
                        radius: 8,
                        fillColor: "#00fff2", // Bright Cyan
                        color: "#fff",
                        weight: 2,
                        fillOpacity: 1,
                        pane: 'markerPane' // Force to top
                    }).addTo(map).bindPopup(`<b>${d.name}</b><br>PM2.5: ${pmValue.toFixed(1)}`);
                }
            });

            if (heatPoints.length > 0) {
                L.heatLayer(heatPoints, {
                    radius: 40,
                    blur: 15,
                    max: 1.0,
                    gradient: {0.4: 'blue', 0.6: 'cyan', 0.8: 'lime', 1.0: 'red'}
                }).addTo(map);
                
                // 3. IMPORTANT: Zoom to the sensors found
                map.fitBounds(bounds, { padding: [50, 50] });
            }

            count.innerText = data.length;
            msg.innerText = "Live: Data Synced";

        } catch (e) {
            msg.innerText = "Error: " + e.message;
        }
    }

    init();
</script>
</body>
</html>
