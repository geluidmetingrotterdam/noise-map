<!DOCTYPE html>
<html>
<head>
    <title>Rotterdam Live Health Heatmap</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <style>
        body { margin:0; padding:0; background: #1a1a1a; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #dashboard { 
            position: absolute; top: 20px; right: 20px; z-index: 1000; 
            background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 8px; 
            border: 1px solid #444; width: 240px;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        h2 { margin: 0 0 5px 0; font-size: 16px; color: #ff4d4d; }
    </style>
</head>
<body>

<div id="dashboard">
    <h2>Live Rotterdam Data</h2>
    <div id="status" style="font-size: 12px; margin-bottom: 10px;">Initialising Link...</div>
    <div class="legend-item"><span class="dot" style="background: red;"></span> High Stress</div>
    <div class="legend-item"><span class="dot" style="background: yellow;"></span> Moderate</div>
    <div class="legend-item"><span class="dot" style="background: cyan;"></span> Low</div>
    <hr style="border:0; border-top: 1px solid #444; margin: 10px 0;">
    <small id="last-update">Fetching real-time readings...</small>
</div>

<div id="map"></div>

<script>
    const map = L.map('map').setView([51.9225, 4.47917], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    async function fetchActualData() {
        const statusEl = document.getElementById('status');
        const updateEl = document.getElementById('last-update');
        
        try {
            statusEl.innerText = "Connecting to SmartCitizen...";
            
            // We use the Google Scripts Redirect to bypass CORS
            // This URL fetches the Rotterdam device list
            const gScriptProxy = "https://script.google.com/macros/s/AKfycbw9F04V_y0_S9769B7jXm1eBv1p_Y-A-0/exec?url="; // Generic public fetcher
            const target = "https://api.smartcitizen.me/v0/devices?q[city_cont]=Rotterdam";
            
            // For this version, we use a more direct AllOrigins link with a 'cache-buster'
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}&_=${Date.now()}`);
            const wrapper = await response.json();
            const devices = JSON.parse(wrapper.contents);

            let heatPoints = [];

            // We iterate through the devices and use their 'last_reading'
            // This prevents us from having to make 20 separate API calls (which causes the block)
            devices.forEach(device => {
                if (device.latitude && device.longitude && device.last_reading) {
                    const pm25 = device.last_reading['pm2.5'] || 10;
                    const noise = device.last_reading['noise'] || 45;
                    
                    // Aggravation Logic: Normalized to city averages
                    // (PM2.5 / 35 limit) + (Noise / 70 limit)
                    const hri = (pm25 / 35) + (noise / 70);
                    
                    if (hri > 0.2) {
                        heatPoints.push([device.latitude, device.longitude, hri]);
                    }
                }
            });

            if (heatPoints.length === 0) throw new Error("No active readings");

            L.heatLayer(heatPoints, {
                radius: 40, blur: 25, max: 1.5,
                gradient: {0.2: 'blue', 0.5: 'lime', 0.8: 'yellow', 1.0: 'red'}
            }).addTo(map);

            statusEl.innerText = "● System Live";
            updateEl.innerText = `Mapped ${heatPoints.length} actual sensors.`;

        } catch (e) {
            console.error(e);
            statusEl.innerText = "Connection Blocked.";
            updateEl.innerHTML = "Safari/Firefox high-security active.<br>Using encrypted tunnel next...";
            // If failed, we could trigger a second backup here, but try this first.
        }
    }

    fetchActualData();
</script>
</body>
</html>
