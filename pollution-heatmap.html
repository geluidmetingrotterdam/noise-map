<!DOCTYPE html>
<html>
<head>
    <title>Rotterdam Aggravated Health Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Heatmap Plugin -->
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        body { margin:0; padding:0; background: #1a1a1a; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #dashboard { 
            position: absolute; top: 20px; right: 20px; z-index: 1000; 
            background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 8px; 
            border: 1px solid #444; width: 220px;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: #ff4d4d; }
    </style>
</head>
<body>

<div id="dashboard">
    <h2>Health Stress Index</h2>
    <div id="status" style="font-size: 12px; margin-bottom: 10px;">Scanning Rotterdam API...</div>
    <div class="legend-item"><span class="dot" style="background: red;"></span> High Aggravation</div>
    <div class="legend-item"><span class="dot" style="background: yellow;"></span> Moderate Risk</div>
    <div class="legend-item"><span class="dot" style="background: cyan;"></span> Low Exposure</div>
</div>

<div id="map"></div>

<script>
    // Initialize Map with a Dark Theme
    const map = L.map('map').setView([51.9225, 4.47917], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    async function loadHeatmap() {
        try {
            const response = await fetch('https://api.smartcitizen.me/v0/devices?q[city_cont]=Rotterdam');
            const devices = await response.json();
            document.getElementById('status').innerText = `Syncing ${devices.length} sensors...`;

            let heatData = [];

            for (let device of devices) {
                try {
                    const detailRes = await fetch(`https://api.smartcitizen.me/v0/devices/${device.id}`);
                    const detail = await detailRes.json();
                    const sensors = detail.data.sensors;

                    // Multi-Particle + Noise extraction
                    const pm1 = sensors.find(s => s.name.includes("PM1 "))?.value || 0;
                    const pm25 = sensors.find(s => s.name.includes("PM2.5"))?.value || 0;
                    const pm10 = sensors.find(s => s.name.includes("PM10"))?.value || 0;
                    const noise = sensors.find(s => s.name.includes("Noise"))?.value || 0;

                    // Aggravation Math: PM1 (Bloodstream) is weighted heaviest
                    const pmTotal = (pm1 * 0.6) + (pm25 * 0.3) + (pm10 * 0.1);
                    const intensity = (pmTotal / 40) + (noise / 75); 

                    if (device.latitude && device.longitude) {
                        heatData.push([device.latitude, device.longitude, intensity]);
                    }
                } catch (e) { continue; } // Skip broken sensors
            }

            L.heatLayer(heatData, {
                radius: 35,
                blur: 20,
                max: 1.2,
                gradient: {0.2: 'blue', 0.4: 'cyan', 0.6: 'lime', 0.8: 'yellow', 1: 'red'}
            }).addTo(map);

            document.getElementById('status').innerText = `Live: ${heatData.length} active zones`;

        } catch (error) {
            document.getElementById('status').innerText = "API connection error.";
        }
    }

    loadHeatmap();
</script>
</body>
</html>
