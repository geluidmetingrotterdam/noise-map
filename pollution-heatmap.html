<!DOCTYPE html>
<html>
<head>
    <title>Rotterdam Aggravated Health Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Heatmap Plugin -->
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        body { margin:0; padding:0; background: #1a1a1a; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #dashboard { 
            position: absolute; top: 20px; right: 20px; z-index: 1000; 
            background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 8px; 
            border: 1px solid #444; width: 220px;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: #ff4d4d; }
    </style>
</head>
<body>

<div id="dashboard">
    <h2>Health Stress Index</h2>
    <div id="status" style="font-size: 12px; margin-bottom: 10px;">Scanning Rotterdam API...</div>
    <div class="legend-item"><span class="dot" style="background: red;"></span> High Aggravation</div>
    <div class="legend-item"><span class="dot" style="background: yellow;"></span> Moderate Risk</div>
    <div class="legend-item"><span class="dot" style="background: cyan;"></span> Low Exposure</div>
</div>

<div id="map"></div>

<script>
    // 1. Initialize Dark Map
    const map = L.map('map').setView([51.9225, 4.47917], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 2. The Proxy (Middleman)
    // AllOrigins allows us to bypass CORS by fetching the data on their server first
    const proxyUrl = "https://api.allorigins.win/get?url=";

    async function loadAggregatedMap() {
        const statusEl = document.getElementById('status');
        try {
            statusEl.innerText = "Bypassing CORS filters...";
            
            // Step 1: Get the list of devices in Rotterdam
            const targetApi = encodeURIComponent("https://api.smartcitizen.me/v0/devices?q[city_cont]=Rotterdam");
            const response = await fetch(proxyUrl + targetApi);
            const data = await response.json();
            
            // AllOrigins wraps the result in a 'contents' string, so we must parse it
            const devices = JSON.parse(data.contents);

            let heatPoints = [];
            statusEl.innerText = `Found ${devices.length} devices. Syncing...`;

            // Step 2: Extract data for the first 10 devices (to avoid proxy timeouts)
            for (let device of devices.slice(0, 10)) {
                if (device.latitude && device.longitude) {
                    // Using the 'last_reading' from the summary to avoid extra API calls
                    // This is faster and less likely to trigger a block
                    const pm25 = device.last_reading?.['pm2.5'] || 10; 
                    const noise = device.last_reading?.['noise'] || 50;
                    
                    // Calculation: Aggravated Intensity
                    const hri = (pm25 / 30) + (noise / 70); 
                    
                    heatPoints.push([device.latitude, device.longitude, hri]);
                }
            }

            // Step 3: Render Heatmap
            L.heatLayer(heatPoints, {
                radius: 40,
                blur: 25,
                max: 1.2,
                gradient: {0.2: 'blue', 0.4: 'cyan', 0.6: 'lime', 0.8: 'yellow', 1.0: 'red'}
            }).addTo(map);

            statusEl.innerText = `Live: ${heatPoints.length} Aggravation Zones`;

        } catch (error) {
            console.error(error);
            statusEl.innerText = "System Blocked. Try Incognito Mode.";
        }
    }

    loadAggregatedMap();
</script>
</body>
</html>
