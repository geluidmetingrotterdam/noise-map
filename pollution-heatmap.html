<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotterdam Live Air Quality</title>
    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; background: #0d1117; }
        #panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(22, 27, 34, 0.9); padding: 20px;
            border-radius: 10px; border: 1px solid #30363d;
            min-width: 200px;
        }
        .count { font-size: 32px; font-weight: bold; color: #58a6ff; }
        .error { color: #f85149; font-size: 12px; }
    </style>
</head>
<body>

<div id="panel">
    <div style="font-size: 11px; text-transform: uppercase; color: #8b949e;">Rotterdam Network</div>
    <div id="count" class="count">--</div>
    <div id="status" style="font-size: 12px;">Connecting...</div>
</div>

<div id="map"></div>

<!-- Leaflet and Heatmap Libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.0.1/leaflet-heat.js"></script>

<script>
    // Initialize map on Rotterdam
    const map = L.map('map', { zoomControl: false }).setView([51.9225, 4.47917], 12);

    // Dark Tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© SmartCitizen.me'
    }).addTo(map);

    async function loadData() {
        const statusEl = document.getElementById('status');
        const countEl = document.getElementById('count');
        
        // Correct API endpoint using the .me domain and tags plural
        const url = 'https://api.smartcitizen.me/v0/devices?tags=rotterdam';

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Connection Error");
            
            const devices = await response.json();
            
            if (devices.length === 0) {
                statusEl.innerHTML = "<span class='error'>No devices found with 'rotterdam' tag.</span>";
                return;
            }

            let heatPoints = [];
            let bounds = L.latLngBounds();

            devices.forEach(d => {
                if (d.latitude && d.longitude) {
                    // Pull PM2.5 or default to a baseline intensity
                    const sensors = d.data.sensors;
                    const pm = sensors.find(s => s.name.includes("PM2.5"))?.value || 5;
                    
                    heatPoints.push([d.latitude, d.longitude, Math.min(pm / 35, 1.0)]);
                    bounds.extend([d.latitude, d.longitude]);

                    // Add a dot for each sensor
                    L.circleMarker([d.latitude, d.longitude], {
                        radius: 5, fillColor: "#58a6ff", color: "#fff", weight: 1, fillOpacity: 0.8
                    }).addTo(map).bindPopup(`<b>${d.name}</b><br>PM2.5: ${pm}`);
                }
            });

            // Create Heatmap
            L.heatLayer(heatPoints, {
                radius: 40, blur: 25, max: 1.0,
                gradient: {0.4: 'blue', 0.6: 'cyan', 0.8: 'lime', 1.0: 'red'}
            }).addTo(map);

            // Zoom map to show all sensors
            map.fitBounds(bounds, { padding: [50, 50] });
            countEl.innerText = heatPoints.length;
            statusEl.innerText = "Data Synced";

        } catch (err) {
            statusEl.innerHTML = "<span class='error'>Failed to load data.</span>";
            console.error(err);
        }
    }

    loadData();
</script>

</body>
</html>
