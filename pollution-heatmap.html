<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rotterdam Air Quality</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: #161b22; padding: 20px; border-radius: 8px;
            border: 1px solid #30363d; min-width: 200px;
        }
        .big { font-size: 32px; font-weight: bold; color: #58a6ff; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 11px; color: #8b949e;">ROTTERDAM NETWORK</div>
    <div id="count" class="big">--</div>
    <div id="msg">Connecting...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.0.1/leaflet-heat.js"></script>

<script>
    const map = L.map('map', { zoomControl: false }).setView([51.92, 4.47], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function init() {
        const msg = document.getElementById('msg');
        const count = document.getElementById('count');

        // We use a simpler query: just search for devices in the Netherlands 
        // then we filter for Rotterdam locally in the code.
        const url = 'https://api.smartcitizen.me/v0/devices?near=51.9225,4.4791&radius=15000';

        try {
            const response = await fetch(url);
            
            if (!response.ok) {
                msg.innerText = "Error: API denied request (" + response.status + ")";
                return;
            }

            const data = await response.json();
            
            if (data.length === 0) {
                msg.innerText = "No sensors found in range.";
                return;
            }

            let heatPoints = [];
            data.forEach(d => {
                if (d.latitude && d.longitude) {
                    // Try to get PM value, otherwise use 10 as placeholder
                    const pm = d.data.sensors.find(s => s.name.includes("PM2.5"))?.value || 10;
                    heatPoints.push([d.latitude, d.longitude, Math.min(pm/40, 1)]);
                    
                    L.circleMarker([d.latitude, d.longitude], {
                        radius: 5, color: '#58a6ff'
                    }).addTo(map).bindPopup(d.name + ": " + pm + " µg/m³");
                }
            });

            L.heatLayer(heatPoints, {radius: 35, blur: 20}).addTo(map);
            count.innerText = data.length;
            msg.innerText = "Live Data Synced";

        } catch (e) {
            msg.innerHTML = "<b style='color:red'>Fetch Failed</b><br><small>" + e.message + "</small>";
        }
    }

    init();
</script>
</body>
</html>
