<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rotterdam 5km Air Quality</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #f8f9fa; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #dashboard {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee;
        }
        .count { font-size: 42px; font-weight: 800; color: #0052cc; line-height: 1; }
        .label { font-size: 11px; color: #666; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="label">ROTTERDAM (5KM RADIUS)</div>
    <div id="count" class="count">--</div>
    <div id="status" style="font-size: 12px; color: #999; margin-top: 5px;">Scanning local sensors...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.0.1/leaflet-heat.js"></script>

<script>
    // 1. Initial Map
    const map = L.map('map', { zoomControl: false }).setView([51.922, 4.479], 13);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© SmartCitizen'
    }).addTo(map);

    async function syncData() {
        const countEl = document.getElementById('count');
        const statusEl = document.getElementById('status');
        
        // 5000 meters = 5km radius around Rotterdam center
        const api = "https://api.smartcitizen.me/v0/devices?near=51.9225,4.4791&radius=5000";

        try {
            const response = await fetch(api);
            const devices = await response.json();
            
            countEl.innerText = devices.length;

            if (devices.length > 0) {
                let heatPoints = [];
                let bounds = L.latLngBounds();

                devices.forEach(d => {
                    if (d.latitude && d.longitude) {
                        // Get PM2.5 or a default intensity
                        const s = d.data.sensors.find(s => s.name.includes("PM2.5")) || { value: 10 };
                        
                        // Add marker
                        L.circleMarker([d.latitude, d.longitude], {
                            radius: 7, fillColor: "#0052cc", color: "#fff", weight: 2, fillOpacity: 0.9
                        }).addTo(map).bindPopup(`<b>${d.name}</b><br>PM2.5: ${s.value}`);

                        heatPoints.push([d.latitude, d.longitude, 1.0]);
                        bounds.extend([d.latitude, d.longitude]);
                    }
                });

                // Add Heatmap
                L.heatLayer(heatPoints, { radius: 35, blur: 15 }).addTo(map);
                
                // Zoom to fit the 5km area
                map.fitBounds(bounds, { padding: [30, 30] });
                statusEl.innerText = "Sync complete.";
            } else {
                statusEl.innerText = "No sensors in 5km range.";
            }

        } catch (err) {
            statusEl.innerText = "Error fetching data.";
        }
    }

    syncData();
</script>
</body>
</html>
